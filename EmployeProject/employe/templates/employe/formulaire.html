{% extends 'employe/base.html' %}

{% block title%}Ajouter | Employe {% endblock %}

{% block content %}
<form method="POST" class="space-y-4 bg-base-100 p-6 shadow-md rounded-lg">
    {% csrf_token%}

    {{forms.matricule}}
    {{forms.nom}}
    {{forms.email}}
    {{forms.poste}}
    {{forms.salaire}}
    {{forms.dateNaissance}}
    {{forms.numero}}
    <button type="submit" class="btn btn-primary">Enregistrer</button>
</form>

{% endblock %}
