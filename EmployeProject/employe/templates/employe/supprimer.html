{% extends 'employe/base.html' %}

{% block title %}Suppression | Employe {% endblock %}

{% block content%}
<form method="post" class="space-y-4 bg-base-100 flex flex-col">
    {% csrf_token %}

    <span class="text-center">Vous voulez vraiment supprimer <strong>{{employe.nom}}</strong>?</span>
    <button type="submit" class="btn btn-error">Supprimer</button>
    <a href="{% url 'liste_employe' %}" class="btn btn-info">Annuler</a>
</form>


{% endblock %}
